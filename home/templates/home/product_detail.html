{% extends 'base.html' %}
{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'home/css/productdetail.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <div class="product-detail">
        <div class="product-detail-image">
            <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width: 350px">
        </div>
        <div class="product-detail-info">
            <h2>{{ product.name }}</h2>
            <div class="product-meta">📅 {{ product.created|date:"Y/m/d" }}</div>
            <div class="product-price">{{ product.price }} تومان</div>
            <div class="product-description">
                <p>{{ product.description|linebreaks }}</p>
            </div>
            <form action="{% url 'orders:cart_add' product.id %}" method="post">
                {% csrf_token %}
                {{ form }}
                <input type="submit" value="افزودن به سبد خرید">
            </form>
        </div>
    </div>
</div>
{% endblock %}
